name: Deploy Prod To Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prod-lightsail-deploy
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.28.2
  ROOT_DIR: /home/ec2-user/dongle.front.prod
  RELEASES_DIR: /home/ec2-user/dongle.front.prod/releases
  CURRENT_CLIENT_DIR: /home/ec2-user/dongle.front.prod/current.client
  CURRENT_ADMIN_DIR: /home/ec2-user/dongle.front.prod/current.admin

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify fast
        run: pnpm verify:fast

      - name: Build client standalone artifact
        env:
          API_URL: ${{ secrets.PROD_API_URL }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.CLIENT_NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.CLIENT_SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.CLIENT_SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.CLIENT_SENTRY_PROJECT }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm --filter dongle-client deploy:standalone:prod

      - name: Build admin standalone artifact
        env:
          API_URL: ${{ secrets.PROD_API_URL }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.ADMIN_NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.ADMIN_SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.ADMIN_SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.ADMIN_SENTRY_PROJECT }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm --filter dongle-admin deploy:standalone:prod

      - name: Prepare SSH key
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem

      - name: Trust Lightsail host
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote directories
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/lightsail.pem ec2-user@"$LIGHTSAIL_HOST" \
            "mkdir -p '$ROOT_DIR' '$RELEASES_DIR' '$RELEASES_DIR/$RELEASE_ID/client' '$RELEASES_DIR/$RELEASE_ID/admin'"

      - name: Sync PM2 config
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/lightsail.pem" \
            ecosystem.config.js \
            ec2-user@"$LIGHTSAIL_HOST":"$ROOT_DIR"/

      - name: Sync client artifact
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/lightsail.pem" \
            apps/DONGLE-CLIENT/.next/standalone/ \
            ec2-user@"$LIGHTSAIL_HOST":"$RELEASES_DIR"/"$RELEASE_ID"/client/

      - name: Sync admin artifact
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/lightsail.pem" \
            apps/DONGLE-ADMIN/.next/standalone/ \
            ec2-user@"$LIGHTSAIL_HOST":"$RELEASES_DIR"/"$RELEASE_ID"/admin/

      - name: Reload PM2 With Rollback
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          RELEASE_ID: ${{ github.sha }}
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ github.sha }}
          CLIENT_NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.CLIENT_NEXT_PUBLIC_SENTRY_DSN }}
          ADMIN_NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.ADMIN_NEXT_PUBLIC_SENTRY_DSN }}
          CLIENT_HEALTHCHECK_URL: ${{ secrets.PROD_CLIENT_HEALTHCHECK_URL }}
          ADMIN_HEALTHCHECK_URL: ${{ secrets.PROD_ADMIN_HEALTHCHECK_URL }}
        run: |
          ssh -i ~/.ssh/lightsail.pem ec2-user@"$LIGHTSAIL_HOST" <<EOF
          set -euo pipefail
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
          CLIENT_RELEASE_DIR="\$RELEASE_DIR/client"
          ADMIN_RELEASE_DIR="\$RELEASE_DIR/admin"
          CLIENT_HEALTHCHECK_URL="$CLIENT_HEALTHCHECK_URL"
          ADMIN_HEALTHCHECK_URL="$ADMIN_HEALTHCHECK_URL"
          LEGACY_CLIENT_TARGET="$ROOT_DIR/dongle.client.prod"
          LEGACY_ADMIN_TARGET="$ROOT_DIR/dongle.admin.prod"
          PREVIOUS_CLIENT_TARGET=\$(readlink -f "$CURRENT_CLIENT_DIR" || true)
          PREVIOUS_ADMIN_TARGET=\$(readlink -f "$CURRENT_ADMIN_DIR" || true)
          ROLLBACK_STARTED=0

          if [ -z "\$PREVIOUS_CLIENT_TARGET" ] && [ -d "\$LEGACY_CLIENT_TARGET" ]; then
            PREVIOUS_CLIENT_TARGET="\$LEGACY_CLIENT_TARGET"
          fi

          if [ -z "\$PREVIOUS_ADMIN_TARGET" ] && [ -d "\$LEGACY_ADMIN_TARGET" ]; then
            PREVIOUS_ADMIN_TARGET="\$LEGACY_ADMIN_TARGET"
          fi

          curl_healthcheck() {
            curl --fail --silent --show-error --retry 10 --retry-delay 2 --retry-connrefused "\$1"
          }

          verify_release() {
            local url="\$1"
            local expected_release="\$2"

            curl_healthcheck "\$url" | grep -q "\"release\":\"\$expected_release\""
          }

          rollback() {
            if [ "\$ROLLBACK_STARTED" = "1" ]; then
              return
            fi

            ROLLBACK_STARTED=1

            if [ -n "\$PREVIOUS_CLIENT_TARGET" ]; then
              ln -sfn "\$PREVIOUS_CLIENT_TARGET" "$CURRENT_CLIENT_DIR"
            fi

            if [ -n "\$PREVIOUS_ADMIN_TARGET" ]; then
              ln -sfn "\$PREVIOUS_ADMIN_TARGET" "$CURRENT_ADMIN_DIR"
            fi

            if pm2 describe dongle.client.prod >/dev/null 2>&1 || pm2 describe dongle.admin.prod >/dev/null 2>&1; then
              pm2 reload "$ROOT_DIR/ecosystem.config.js" --update-env || true
            else
              pm2 start "$ROOT_DIR/ecosystem.config.js" --update-env || true
            fi

            if [ -n "\${CLIENT_HEALTHCHECK_URL:-}" ]; then
              curl_healthcheck "\$CLIENT_HEALTHCHECK_URL" >/dev/null || true
            fi

            if [ -n "\${ADMIN_HEALTHCHECK_URL:-}" ]; then
              curl_healthcheck "\$ADMIN_HEALTHCHECK_URL" >/dev/null || true
            fi

            if [ -n "\$PREVIOUS_CLIENT_TARGET" ]; then
              echo "Rolled back client to \$PREVIOUS_CLIENT_TARGET"
            fi

            if [ -n "\$PREVIOUS_ADMIN_TARGET" ]; then
              echo "Rolled back admin to \$PREVIOUS_ADMIN_TARGET"
            fi

            if pm2 describe dongle.client.prod >/dev/null 2>&1 || pm2 describe dongle.admin.prod >/dev/null 2>&1; then
              pm2 save || true
            fi
          }

          cat > "$ROOT_DIR/.env.pm2.prod" <<ENVFILE
          API_URL=$PROD_API_URL
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=$NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
          SENTRY_ENVIRONMENT=$SENTRY_ENVIRONMENT
          SENTRY_RELEASE=$SENTRY_RELEASE
          CLIENT_NEXT_PUBLIC_SENTRY_DSN=$CLIENT_NEXT_PUBLIC_SENTRY_DSN
          ADMIN_NEXT_PUBLIC_SENTRY_DSN=$ADMIN_NEXT_PUBLIC_SENTRY_DSN
          DEPLOY_CLIENT_DIR_PROD=$CURRENT_CLIENT_DIR
          DEPLOY_ADMIN_DIR_PROD=$CURRENT_ADMIN_DIR
          ENVFILE

          ln -sfn "\$CLIENT_RELEASE_DIR" "$CURRENT_CLIENT_DIR"
          ln -sfn "\$ADMIN_RELEASE_DIR" "$CURRENT_ADMIN_DIR"

          if ! {
            if pm2 describe dongle.client.prod >/dev/null 2>&1 || pm2 describe dongle.admin.prod >/dev/null 2>&1; then
              pm2 reload "$ROOT_DIR/ecosystem.config.js" --update-env
            else
              pm2 start "$ROOT_DIR/ecosystem.config.js" --update-env
            fi
          }; then
            rollback
            exit 1
          fi

          if ! verify_release http://127.0.0.1:3000/api/health "$SENTRY_RELEASE"; then
            rollback
            exit 1
          fi

          if ! verify_release http://127.0.0.1:4000/api/health "$SENTRY_RELEASE"; then
            rollback
            exit 1
          fi

          if [ -n "\${CLIENT_HEALTHCHECK_URL:-}" ] && ! curl_healthcheck "\$CLIENT_HEALTHCHECK_URL" >/dev/null; then
            rollback
            exit 1
          fi

          if [ -n "\${ADMIN_HEALTHCHECK_URL:-}" ] && ! curl_healthcheck "\$ADMIN_HEALTHCHECK_URL" >/dev/null; then
            rollback
            exit 1
          fi

          pm2 save
          EOF
